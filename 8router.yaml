# 8Router Configuration
# AI Routing Gateway — 8Agents Ecosystem

port: 8080
host: "0.0.0.0"

fallback:
  tiers:
    - subscription
    - cheap
    - free
  maxRetries: 3
  retryDelayMs: 1000
  circuitBreakerThreshold: 5
  circuitBreakerResetMs: 60000

compression:
  rtk:
    enabled: true
    compressToolOutput: true
    removeLineNumbers: true
    collapseWhitespace: true
    maxToolOutputTokens: 2000
  caveman:
    enabled: false
    level: 3

dashboard:
  enabled: true
  port: 8081

logLevel: info

# Provider configuration
# API keys are auto-detected from environment variables:
#   OPENAI_API_KEY, ANTHROPIC_API_KEY, GOOGLE_API_KEY, OPENROUTER_API_KEY, GROQ_API_KEY
#
# Or add providers manually:
# providers:
#   - id: my-openai
#     name: OpenAI
#     apiKey: sk-...
#     tier: subscription
#     baseUrl: https://api.openai.com/v1
#     models:
#       - gpt-4o
#       - gpt-4o-mini
#     enabled: true
